name: openalex-collector

# 논문 실수집: 매시 자동 재개 + 수동 시작. 1분당 100편, data 브랜치에 누적 (main 무커밋 → 앱 재부팅 없음)
on:
  schedule:
    - cron: "7 * * * *"          # 매시 07분 (UTC) — 완료 후엔 심박만 남기고 조기종료
  workflow_dispatch:
    inputs:
      minutes:
        description: "이번 회차 실행 시간(분)"
        default: "55"

permissions:
  contents: write

concurrency:
  group: openalex-collector      # 중복 실행 방지 (이전 회차 끝날 때까지 대기)
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # data 브랜치 fetch/push용

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install --quiet requests

      - name: 📥 논문 수집 (1분당 100편, 누적)
        env:
          RUN_MINUTES: ${{ github.event.inputs.minutes || '55' }}
        run: python agents/openalex_collect.py
